<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Carte des annonces — LocSenegal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
  <style>
    #map { height: calc(100vh - 64px - 56px); width: 100%; z-index: 1; }
    .carte-layout { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 64px - 56px); }
    .carte-sidebar { overflow-y: auto; background: var(--white); border-right: 1px solid var(--border); }
    .carte-sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--white); z-index: 2; }
    .carte-sidebar-header h2 { font-size: 17px; font-weight: 700; margin-bottom: 10px; }
    .carte-sidebar-search { position: relative; }
    .carte-sidebar-search input { width: 100%; padding: 10px 14px 10px 36px; border-radius: 8px; border: 1.5px solid var(--border); font-size: 13px; font-family: var(--font-body); }
    .carte-sidebar-search::before { content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; }
    .carte-list { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .carte-item { background: var(--bg); border-radius: 10px; padding: 12px; cursor: pointer; border: 1.5px solid transparent; transition: all .15s; display: flex; gap: 10px; }
    .carte-item:hover, .carte-item.active { border-color: var(--green); background: var(--green-pale); }
    .carte-item-img { width: 64px; height: 64px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
    .carte-item-body { flex: 1; min-width: 0; }
    .carte-item-title { font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .carte-item-meta { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .carte-item-price { font-size: 14px; font-weight: 800; color: var(--green-dark); }
    .map-popup-img { width: 100%; height: 120px; object-fit: cover; border-radius: 6px; margin-bottom: 8px; }
    .map-popup-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
    .map-popup-price { color: #065f46; font-weight: 800; font-size: 15px; margin-bottom: 8px; }
    .map-popup-btn { display: inline-block; padding: 6px 14px; background: #10b981; color: white; border-radius: 6px; font-size: 12px; font-weight: 700; text-decoration: none; }
    .locate-btn { position: absolute; bottom: 24px; right: 12px; z-index: 1000; width: 44px; height: 44px; border-radius: 50%; background: var(--white); border: 1.5px solid var(--border); font-size: 20px; box-shadow: var(--shadow); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
    .locate-btn:hover { background: var(--green-pale); border-color: var(--green); }
    .filters-bar-carte { background: var(--white); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; gap: 8px; overflow-x: auto; height: 56px; align-items: center; }
    .filters-bar-carte::-webkit-scrollbar { display: none; }
    @media(max-width:768px) {
      .carte-layout { grid-template-columns: 1fr; grid-template-rows: 1fr 280px; }
      .carte-sidebar { overflow-x: auto; overflow-y: hidden; }
      .carte-list { flex-direction: row; flex-wrap: nowrap; padding: 10px; }
      .carte-item { min-width: 200px; flex-direction: column; }
      .carte-item-img { width: 100%; height: 80px; }
      #map { height: calc(100vh - 64px - 56px - 280px); }
    }
  </style>
</head>
<body>
<header class="navbar" id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><span class="logo-icon">🏠</span><span class="logo-text">Loc<strong>Senegal</strong></span></a>
    <nav class="nav-links" id="navLinks">
      <a href="index.html" class="nav-link">Accueil</a>
      <a href="publication.html" class="nav-btn-pub">+ Publier</a>
      <a href="connexion.html" class="nav-link">Connexion</a>
    </nav>
    <button class="nav-burger" id="navBurger"><span></span><span></span><span></span></button>
  </div>
</header>

<div class="filters-bar-carte">
  <button class="filter-chip active" data-type="">Tous</button>
  <button class="filter-chip" data-type="Chambre">🛏️ Chambres</button>
  <button class="filter-chip" data-type="Studio">🏠 Studios</button>
  <button class="filter-chip" data-type="Appartement">🏢 Appartements</button>
  <button class="filter-chip" data-type="Villa">🏡 Villas</button>
</div>

<div class="carte-layout">
  <!-- Sidebar liste -->
  <div class="carte-sidebar">
    <div class="carte-sidebar-header">
      <h2>🗺️ Annonces sur la carte</h2>
      <div class="carte-sidebar-search">
        <input type="search" id="carteSearch" placeholder="Filtrer par quartier…">
      </div>
    </div>
    <div class="carte-list" id="carteList">
      <div style="padding:20px;text-align:center;color:var(--muted)">
        <div class="loader-ring" style="margin:0 auto 12px"></div>
        Chargement…
      </div>
    </div>
  </div>

  <!-- Carte -->
  <div style="position:relative">
    <div id="map"></div>
    <button class="locate-btn" id="locateBtn" title="Me localiser">📍</button>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, query, orderBy }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyA8lP2C_4KP_djeKCCXp9vaL22Q6RhJGGU",
  authDomain: "locsenegal-c51f3.firebaseapp.com",
  projectId: "locsenegal-c51f3",
  storageBucket: "locsenegal-c51f3.firebasestorage.app",
  messagingSenderId: "373041547451",
  appId: "1:373041547451:web:75bab15266ceb97d87019e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Coordonnées des quartiers de Dakar
const QUARTIERS = {
  'Guédiawaye':         [14.785, -17.389],
  'Pikine':             [14.750, -17.393],
  'Grand Yoff':         [14.742, -17.456],
  'Sacré-Cœur':         [14.729, -17.469],
  'Yoff':               [14.772, -17.497],
  'Mermoz':             [14.725, -17.487],
  'Liberté 6':          [14.736, -17.462],
  'Parcelles Assainies':[14.766, -17.438],
  'Plateau':            [14.694, -17.437],
  'Ouakam':             [14.748, -17.502],
  'Ngor':               [14.762, -17.511],
  'Almadies':           [14.754, -17.519],
  'Thiès':              [14.791, -16.926],
  'Saint-Louis':        [16.027, -16.498],
  'Ziguinchor':         [12.565, -16.271],
};

// Init carte centrée sur Dakar
const map = L.map('map').setView([14.730, -17.460], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
  maxZoom: 19
}).addTo(map);

const markers = [];
let allListings = [];
let activeType = '';

// Icônes personnalisées
const makeIcon = (color = '#10b981', top = false) => L.divIcon({
  className: '',
  html: `<div style="
    background:${color}; color:white; border-radius:50% 50% 50% 0;
    width:36px; height:36px; display:flex; align-items:center; justify-content:center;
    font-size:${top ? '16px' : '14px'}; font-weight:800; transform:rotate(-45deg);
    box-shadow:0 2px 8px rgba(0,0,0,0.3); border:2px solid white;">
    <span style="transform:rotate(45deg)">${top ? '⭐' : '🏠'}</span>
  </div>`,
  iconSize: [36, 36],
  iconAnchor: [18, 36],
  popupAnchor: [0, -40],
});

function getCoords(locality) {
  // Cherche une correspondance approximative
  for (const [key, coords] of Object.entries(QUARTIERS)) {
    if (locality?.toLowerCase().includes(key.toLowerCase()) ||
        key.toLowerCase().includes(locality?.toLowerCase() || '')) {
      return coords;
    }
  }
  // Coordonnées aléatoires autour de Dakar si non trouvé
  return [14.720 + (Math.random() - 0.5) * 0.1, -17.450 + (Math.random() - 0.5) * 0.1];
}

function renderMap(listings) {
  // Effacer markers existants
  markers.forEach(m => map.removeLayer(m));
  markers.length = 0;

  listings.forEach(item => {
    const coords = item.lat && item.lng ? [item.lat, item.lng] : getCoords(item.locality);
    const icon = makeIcon(item.top ? '#f59e0b' : '#10b981', item.top);
    const marker = L.marker(coords, { icon }).addTo(map);
    const img = item.img || 'https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=300&q=60';
    marker.bindPopup(`
      <div style="width:220px;font-family:sans-serif">
        <img src="${img}" class="map-popup-img" loading="lazy">
        <div class="map-popup-title">${item.title}</div>
        <div style="font-size:12px;color:#6b7280;margin-bottom:4px">📍 ${item.locality}</div>
        <div class="map-popup-price">${Number(item.price).toLocaleString('fr-FR')} F/mois</div>
        <a href="tel:${item.contact}" class="map-popup-btn">📞 Appeler</a>
      </div>`, { maxWidth: 240 });
    markers.push(marker);
  });
}

function renderSidebar(listings) {
  const list = document.getElementById('carteList');
  if (listings.length === 0) {
    list.innerHTML = '<p style="padding:20px;text-align:center;color:var(--muted)">Aucune annonce trouvée.</p>';
    return;
  }
  list.innerHTML = '';
  listings.forEach((item, idx) => {
    const img = item.img || 'https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=120&q=60';
    const el = document.createElement('div');
    el.className = 'carte-item';
    el.innerHTML = `
      <img class="carte-item-img" src="${img}" alt="${item.title}" loading="lazy">
      <div class="carte-item-body">
        <div class="carte-item-title">${item.title}</div>
        <div class="carte-item-meta">📍 ${item.locality} · ${item.type}</div>
        <div class="carte-item-price">${Number(item.price).toLocaleString('fr-FR')} F/mois</div>
      </div>`;
    el.addEventListener('click', () => {
      document.querySelectorAll('.carte-item').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      markers[idx]?.openPopup();
      const coords = markers[idx]?.getLatLng();
      if (coords) map.setView(coords, 15, { animate: true });
    });
    list.appendChild(el);
  });
}

function applyFilters() {
  let result = [...allListings];
  if (activeType) result = result.filter(l => l.type === activeType);
  const search = document.getElementById('carteSearch').value.toLowerCase();
  if (search) result = result.filter(l => l.locality?.toLowerCase().includes(search) || l.title?.toLowerCase().includes(search));
  renderMap(result);
  renderSidebar(result);
}

// Charger données
async function loadData() {
  try {
    const q = query(collection(db, 'annonces'), orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);
    allListings = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch(e) {
    // Données démo si Firebase non configuré
    allListings = [
      { id:'1', type:'Chambre', title:'Chambre meublée à Guédiawaye', locality:'Guédiawaye', price:20000, contact:'77 123 4567', img:'https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=300&q=60', top:false },
      { id:'2', type:'Appartement', title:'Appartement 2 pièces à Pikine', locality:'Pikine', price:45000, contact:'77 234 5678', img:'https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=300&q=60', top:true },
      { id:'3', type:'Studio', title:'Studio moderne Grand Yoff', locality:'Grand Yoff', price:30000, contact:'77 345 6789', img:'https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=300&q=60', top:false },
      { id:'4', type:'Appartement', title:'Appartement meublé Sacré-Cœur', locality:'Sacré-Cœur', price:60000, contact:'77 456 7890', img:'https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=300&q=60', top:true },
      { id:'5', type:'Villa', title:'Villa avec jardin à Yoff', locality:'Yoff', price:150000, contact:'77 678 9012', img:'https://images.unsplash.com/photo-1613977257363-707ba9348227?w=300&q=60', top:true },
      { id:'6', type:'Chambre', title:'Chambre à Parcelles Assainies', locality:'Parcelles Assainies', price:18000, contact:'77 567 8901', img:'https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=300&q=60', top:false },
    ];
  }
  applyFilters();
}

// Bouton localisation
document.getElementById('locateBtn').addEventListener('click', () => {
  map.locate({ setView: true, maxZoom: 15 });
});
map.on('locationfound', (e) => {
  L.marker(e.latlng, {
    icon: L.divIcon({
      className: '',
      html: '<div style="background:#3b82f6;width:16px;height:16px;border-radius:50%;border:3px solid white;box-shadow:0 0 0 6px rgba(59,130,246,0.2)"></div>',
      iconSize: [16, 16], iconAnchor: [8, 8]
    })
  }).addTo(map).bindPopup('📍 Vous êtes ici').openPopup();
});
map.on('locationerror', () => {
  const t = document.createElement('div');
  t.className = 'toast toast-error'; t.textContent = '❌ Localisation refusée';
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => t.remove(), 3000);
});

// Filtres
document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeType = chip.dataset.type;
    applyFilters();
  });
});
document.getElementById('carteSearch').addEventListener('input', applyFilters);

// Navbar
document.getElementById('navBurger').addEventListener('click', () => {
  document.getElementById('navLinks').classList.toggle('open');
  document.getElementById('navBurger').classList.toggle('open');
});
window.addEventListener('scroll', () => {
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 60);
});

loadData();
</script>
</body>
</html>
