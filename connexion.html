<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Connexion — LocSenegal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="navbar" id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><span class="logo-icon">🏠</span><span class="logo-text">Loc<strong>Senegal</strong></span></a>
    <nav class="nav-links" id="navLinks">
      <a href="index.html" class="nav-link">Accueil</a>
      <a href="inscription.html" class="nav-btn-pub">Créer un compte</a>
    </nav>
    <button class="nav-burger" id="navBurger"><span></span><span></span><span></span></button>
  </div>
</header>

<div class="form-page">
  <div class="form-card">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:48px;margin-bottom:12px">🔐</div>
      <h1 class="form-title">Bon retour !</h1>
      <p class="form-sub">Connectez-vous à votre compte LocSenegal</p>
    </div>

    <!-- Bouton Google -->
    <button class="google-btn" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
      Continuer avec Google
    </button>

    <div class="divider"><span>ou</span></div>

    <form id="loginForm">
      <div class="field">
        <label>Adresse email</label>
        <input type="email" id="email" placeholder="votre@email.com" required autocomplete="email">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <div class="input-eye">
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="eye-btn" id="eyeBtn">👁</button>
        </div>
      </div>
      <div style="text-align:right;margin:-8px 0 18px">
        <a href="#" id="forgotLink" style="font-size:13px;color:var(--green-dark);font-weight:600">Mot de passe oublié ?</a>
      </div>
      <div id="loginError" class="form-error" style="display:none"></div>
      <button type="submit" class="btn-primary form-submit" id="submitBtn">Se connecter</button>
    </form>

    <p class="form-link">Pas encore de compte ? <a href="inscription.html">Créer un compte gratuitement</a></p>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<style>
.google-btn {
  width:100%; padding:12px 20px; border-radius:10px;
  background:#fff; border:1.5px solid var(--border);
  display:flex; align-items:center; justify-content:center; gap:12px;
  font-size:15px; font-weight:600; font-family:var(--font-body);
  color:var(--ink); cursor:pointer; transition:background .15s, border-color .15s;
}
.google-btn:hover { background:var(--bg); border-color:#aaa; }
.divider { display:flex; align-items:center; gap:12px; margin:20px 0; }
.divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
.divider span { font-size:13px; color:var(--muted); font-weight:600; }
.input-eye { position:relative; }
.input-eye input { width:100%; padding-right:44px; }
.eye-btn { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; font-size:16px; cursor:pointer; padding:4px; }
.form-error { background:#fde8e8; color:#b91c1c; border-radius:8px; padding:10px 14px; font-size:13px; font-weight:600; margin-bottom:16px; }
.form-submit { justify-content:center; }
</style>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, sendPasswordResetEmail }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyA8lP2C_4KP_djeKCCXp9vaL22Q6RhJGGU",
  authDomain: "locsenegal-c51f3.firebaseapp.com",
  projectId: "locsenegal-c51f3",
  storageBucket: "locsenegal-c51f3.firebasestorage.app",
  messagingSenderId: "373041547451",
  appId: "1:373041547451:web:75bab15266ceb97d87019e"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// Redirige selon le rôle enregistré dans Firestore
const redirectParRole = async (user) => {
  try {
    const userDoc = await getDoc(doc(db, 'users', user.uid));
    if (userDoc.exists()) {
      const role = userDoc.data().role;
      if (role === 'proprietaire') {
        window.location.href = 'publication.html';
      } else {
        window.location.href = 'index.html';
      }
    } else {
      window.location.href = 'profil.html';
    }
  } catch(e) {
    window.location.href = 'profil.html';
  }
};

const showToast = (msg, type='info') => {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3500);
};

const showError = (msg) => {
  const el = document.getElementById('loginError');
  el.textContent = msg; el.style.display = 'block';
};

// Connexion Google
document.getElementById('googleBtn').addEventListener('click', async () => {
  try {
    const result = await signInWithPopup(auth, provider);
    showToast('✅ Connecté avec Google !', 'success');
    setTimeout(() => redirectParRole(result.user), 1000);
  } catch(e) {
    showError('Connexion Google échouée. Réessayez.');
  }
});

// Connexion email/password
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.textContent = 'Connexion…'; btn.disabled = true;
  document.getElementById('loginError').style.display = 'none';
  try {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const cred = await signInWithEmailAndPassword(auth, email, password);
    showToast('✅ Connexion réussie !', 'success');
    setTimeout(() => redirectParRole(cred.user), 1000);
  } catch(e) {
    const msgs = {
      'auth/user-not-found': 'Aucun compte avec cet email.',
      'auth/wrong-password': 'Mot de passe incorrect.',
      'auth/too-many-requests': 'Trop de tentatives. Réessayez plus tard.',
      'auth/invalid-email': 'Email invalide.',
    };
    showError(msgs[e.code] || 'Erreur de connexion. Vérifiez vos identifiants.');
    btn.textContent = 'Se connecter'; btn.disabled = false;
  }
});

// Mot de passe oublié
document.getElementById('forgotLink').addEventListener('click', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  if (!email) { showError('Entrez votre email d\'abord.'); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    showToast('📧 Email de réinitialisation envoyé !', 'success');
  } catch(e) {
    showError('Email introuvable ou invalide.');
  }
});

// Afficher/masquer mot de passe
document.getElementById('eyeBtn').addEventListener('click', () => {
  const input = document.getElementById('password');
  input.type = input.type === 'password' ? 'text' : 'password';
});

// Navbar burger
document.getElementById('navBurger').addEventListener('click', () => {
  document.getElementById('navLinks').classList.toggle('open');
  document.getElementById('navBurger').classList.toggle('open');
});
window.addEventListener('scroll', () => {
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 60);
});
</script>
</body>
</html>
